name: Build ink! Contracts

on:
  push:
    branches: [main, master]
    paths:
      - 'examples/**'
      - '.github/workflows/build-contracts.yml'
  pull_request:
    paths:
      - 'examples/**'
      - '.github/workflows/build-contracts.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: paritytech/contracts-ci-linux:production
    steps:
      - uses: actions/checkout@v4

      - name: Build auction
        run: cargo contract build --release
        working-directory: examples/auction

      - name: Build escrow
        run: cargo contract build --release
        working-directory: examples/escrow

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contracts
          path: examples/*/target/ink/*.contract
