name: Build ink! Contracts

on:
  push:
    branches: [main, master]
    paths:
      - 'examples/**'
      - '.github/workflows/build-contracts.yml'
  pull_request:
    paths:
      - 'examples/**'
      - '.github/workflows/build-contracts.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - name: Cache cargo home
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-${{ runner.os }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: cargo-home-${{ runner.os }}-

      - name: Install cargo-contract
        run: cargo +stable install cargo-contract --locked --version 3.2.0

      - name: Install build toolchain (nightly-2024-02-01)
        run: |
          rustup toolchain install nightly-2024-02-01 \
            --target wasm32-unknown-unknown \
            --component rust-src
          rustup default nightly-2024-02-01

      - name: Build auction
        run: cargo contract build --release
        working-directory: examples/auction

      - name: Build escrow
        run: cargo contract build --release
        working-directory: examples/escrow

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contracts
          path: examples/*/target/ink/*.contract
